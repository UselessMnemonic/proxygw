<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 480" role="img" aria-labelledby="title desc">
  <title id="title">ProxyGW</title>
  <desc id="desc">Logo for Proxy Gateway</desc>
  <defs>
    <style>
      .navy { fill: #15233b; }
      .blue { fill: #2f80ed; }
      .cyan { fill: #32c5ff; }
      .orange { fill: #ff9900; }
      .white { fill: #ffffff; }
      .stroke-navy { stroke: #15233b; }
      .stroke-blue { stroke: #2f80ed; }
      .stroke-cyan { stroke: #32c5ff; }
      .stroke-orange { stroke: #ff9900; }
    </style>
  </defs>

  <g transform="translate(260 188)">
    <g id="proxygw-routing-bottom" transform="rotate(0)">
        <polygon
          points="-79,136 79,136 0,0"
          class="orange"/>
    </g>

    <g id="proxygw-diamond" transform="scale(0.86) rotate(0)">
        <rect
          x="-100"
          y="-100"
          width="200"
          height="200"
          rx="18"
          fill="#edf7ff"
          stroke="#15233b"
          stroke-width="12"
          stroke-linejoin="round"
          transform="rotate(45)"/>
        <rect
          x="-76"
          y="-76"
          width="152"
          height="152"
          rx="10"
          fill="none"
          stroke="#2f80ed"
          stroke-width="5"
          stroke-linejoin="round"
          opacity=".34"
          transform="rotate(45)"/>
    </g>

    <g id="proxygw-routing-top" transform="rotate(0)">
        <polygon
          points="-79,-136 79,-136 0,0"
          class="orange"/>
    </g>
  </g>

  <g transform="translate(260 354)">
    <text
      x="0"
      y="58"
      class="navy"
      font-family="Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
      font-size="78"
      font-weight="800"
      letter-spacing="0"
      text-anchor="middle">Proxy<tspan class="orange">GW</tspan></text>
  </g>
</svg>
